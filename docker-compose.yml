version: '3.8'

services:
  mcp-alerts-app:
    build: .
    container_name: mcp_alerts_container
    ports:
      - "${PORT:-3001}:${PORT:-3001}" # Uses PORT from .env, defaults to 3001
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - mcp-network

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    restart: unless-stopped
    networks:
      - mcp-network
    depends_on:
      - mcp-alerts-app

networks:
  mcp-network:
    driver: bridge
