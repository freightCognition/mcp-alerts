name: Deploy to Production

# Trigger the workflow on push to main branch
on:
  push:
    branches: [ main ]
  # Allow manual triggering from GitHub UI
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Production Server
    # This ensures it runs on your self-hosted runner
    runs-on: self-hosted
    environment: production

    steps:
    # Step 1: Checkout the latest code
    - name: Checkout code
      uses: actions/checkout@v4
      
    # Step 2: Stop the existing containers (if running)
    - name: Stop existing containers
      run: |
        if docker ps -q -f name=mcp-alerts; then
          echo "Stopping existing mcp-alerts container..."
          docker stop mcp-alerts || true
          docker rm mcp-alerts || true
        else
          echo "No existing mcp-alerts container found"
        fi
        
        if docker ps -q -f name=cloudflared; then
          echo "Stopping existing cloudflared container..."
          docker stop cloudflared || true
          docker rm cloudflared || true
        else
          echo "No existing cloudflared container found"
        fi
      continue-on-error: true
      
    # Step 3: Remove old Docker image (optional, saves space)
    - name: Remove old Docker image
      run: |
        if docker images -q mcp-alerts; then
          echo "Removing old image..."
          docker rmi mcp-alerts || true
        fi
      continue-on-error: true
      
    # Step 4: Create Docker network for container communication
    - name: Create Docker network
      run: |
        if ! docker network ls | grep -q mcp-network; then
          echo "Creating Docker network..."
          docker network create mcp-network
        else
          echo "Docker network already exists"
        fi
      continue-on-error: true
        
    # Step 5: Build new Docker image
    - name: Build Docker image
      run: |
        echo "Building new Docker image..."
        docker build -t mcp-alerts .
        
    # Step 5: Create .env file with secrets and variables
    - name: Create environment file
      run: |
        echo "Creating .env file..."
        cat > .env << EOF
        NODE_ENV=production
        PORT=${{ vars.PORT }}
        SLACK_BOT_TOKEN=${{ secrets.SLACK_BOT_TOKEN }}
        SLACK_APP_TOKEN=${{ secrets.SLACK_APP_TOKEN }}
        SLACK_CHANNEL=${{ vars.SLACK_CHANNEL }}
        SLACK_WEBHOOK_URL=${{ secrets.SLACK_WEBHOOK_URL }}
        MCP_WEBHOOK_SIGNING_SECRET=${{ secrets.MCP_WEBHOOK_SIGNING_SECRET }}
        MCP_WEBHOOK_URL_PATH=${{ vars.MCP_WEBHOOK_URL_PATH }}
        PUBLIC_APP_URL=${{ vars.PUBLIC_APP_URL }}
        EOF

    # Step 6: Start mcp-alerts container
    - name: Start mcp-alerts container
      run: |
        echo "Starting mcp-alerts container..."
        docker run -d \
          --name mcp-alerts \
          --restart unless-stopped \
          --network mcp-network \
          -p 3001:3001 \
          --env-file .env \
          mcp-alerts
          
    # Step 7: Start cloudflared container
    - name: Start cloudflared container
      run: |
        echo "Starting cloudflared container..."
        docker run -d \
          --name cloudflared \
          --restart unless-stopped \
          --network mcp-network \
          cloudflare/cloudflared:latest \
          tunnel --no-autoupdate run --token ${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}
          
    # Step 8: Wait a moment and check if containers are running
    - name: Verify deployment
      run: |
          echo "Waiting for containers to become ready..."
          sleep 10
          MAX_RETRIES=20
          SLEEP_TIME=3
          
          # Check mcp-alerts container
          for i in $(seq 1 $MAX_RETRIES); do
            if docker ps -q -f name=mcp-alerts; then
              if curl -fs http://localhost:3001/health >/dev/null; then
                echo "✅ MCP Alerts health check passed!"
                MCP_SUCCESS=true
                break
              else
                echo "MCP Alerts health check failed (attempt $i/$MAX_RETRIES), retrying..."
              fi
            else
              echo "MCP Alerts container not running yet (attempt $i/$MAX_RETRIES)..."
            fi
            sleep $SLEEP_TIME
          done

          if [ "$MCP_SUCCESS" != "true" ]; then
            echo "❌ MCP Alerts health check failed after $MAX_RETRIES attempts!"
            echo "Container logs:"
            docker logs mcp-alerts || true
            exit 1
          fi
          
          # Check cloudflared container
          if docker ps -q -f name=cloudflared; then
            echo "✅ Cloudflared container is running!"
            CLOUDFLARED_SUCCESS=true
          else
            echo "❌ Cloudflared container is not running!"
            echo "Container logs:"
            docker logs cloudflared || true
            exit 1
          fi
          
          # Display running containers
          if [ "$MCP_SUCCESS" = "true" ] && [ "$CLOUDFLARED_SUCCESS" = "true" ]; then
            echo "✅ All containers deployed successfully!"
            docker ps -f name=mcp-alerts
            docker ps -f name=cloudflared
          fi
        
    # Step 8: Clean up .env file for security
    - name: Clean up
      run: |
        rm -f .env
        echo "Cleaned up temporary files"
      if: always()
      
    # Step 10: Send notification (optional)
    - name: Deployment notification
      run: |
        echo "🚀 MCP Alerts and Cloudflare Tunnel deployed successfully!"
        echo "Application is now running on $(hostname) at port 3001"
        echo "Cloudflare Tunnel is active and routing traffic to the application"
